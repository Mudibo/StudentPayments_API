apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  namespace: studentpayments
  labels:
    app: pgadmin
  
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "studentpayments-db",
          "Group": "Servers",
          "Host": "postgres",
          "Port": 5432,
          "MaintenanceDB": "studentpaymentsapi",
          "Username": "studentpaymentsapi",
          "SSLMode": "prefer",
          "PassFile": "/pgpass/pgpassfile"
        }
      }
    }
