apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: studentpayments
data:
  nginx.conf: |
    events {}

    http {
        limit_req_zone $binary_remote_addr zone=mylimit:10m rate=5r/m;
        limit_req_status 429;

        upstream api {
            server studentpayments-api:8080;
        }

        server {
            listen 80;

            location /api/oauth/token {
                limit_req zone=mylimit burst=1;
                proxy_pass http://api;
                proxy_read_timeout 340s;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Health check endpoint for Kubernetes readinessProbe
            location = /healthz {
                access_log off;
                return 200 'ok';
                add_header Content-Type text/plain;
            }

            location / {
                proxy_pass http://api;
                proxy_read_timeout 340s;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
