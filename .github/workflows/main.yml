# =========================================================
# CI/CD Pipeline for StudentPayments API
# Includes:
# - Code linting
# - .NET build validation
# - Security scanning (CodeQL)
# - Container vulnerability scanning (Trivy)
# - Docker build with caching
# - Docker image push to DockerHub
# =========================================================

name: CI/CD Pipeline

# ---------------------------------------------------------
# When the workflow runs
# ---------------------------------------------------------
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# ---------------------------------------------------------
# Prevent multiple pipelines running for the same branch
# Cancels previous pipelines when new commits are pushed
# ---------------------------------------------------------
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------
# Global environment variables
# ---------------------------------------------------------
env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/studentpaymentsapi

jobs:

# =========================================================
# 1️. LINT JOB
# Runs first to validate code formatting and quality
# =========================================================
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run GitHub Super Linter
      # This checks multiple languages in the repo
      - name: Run Super Linter
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_CSHARP: true
          VALIDATE_DOCKERFILE: true
          VALIDATE_YAML: true
          VALIDATE_MARKDOWN: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =========================================================
# 2️. BUILD JOB
# Builds the .NET project and restores dependencies
# =========================================================
  build:
    name: Build .NET Application
    runs-on: ubuntu-latest
    needs: lint

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Cache NuGet dependencies to speed up builds
      - name: Cache .NET dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            **/bin
            **/obj
          key: ${{ runner.os }}-dotnet-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      # Restore project dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Build the project
      # --no-restore avoids restoring twice
      - name: Build project
        run: dotnet build --no-restore --configuration Release

# =========================================================
# 3️. CODEQL SECURITY SCAN
# Static Application Security Testing (SAST)
# =========================================================
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initialize CodeQL for C#
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      # Autobuild attempts to compile the project
      - name: Autobuild project
        uses: github/codeql-action/autobuild@v3

      # Run the CodeQL analysis
      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

# =========================================================
# 4️. DOCKER BUILD + SECURITY SCAN + PUSH
# Only runs on pushes to main branch
# =========================================================
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, codeql]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Docker Buildx (advanced Docker builder)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker image using layer caching
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the container image for vulnerabilities
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # Push image to DockerHub
      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
